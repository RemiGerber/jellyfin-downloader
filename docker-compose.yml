services:
  jellyfin-downloader:
    image: ${DOCKER_IMAGE:-ubbrelf/jellyfin-downloader}:${DOCKER_TAG:-latest}
    build: .
    ports:
      - "${HOST_PORT:-3003}:3003"
    volumes:
      # Change MEDIA_FOLDER in .env to wherever your media library lives.
      # Examples:
      #   MEDIA_FOLDER=/mnt/nas
      #   MEDIA_FOLDER=/home/youruser/media
      - ${MEDIA_FOLDER:-/mnt/nas}:/media
      # Persists app data (followed shows, etc.) across container restarts
      - ${APP_DATA:-jellyfin-downloader-data}:/app/data  # set APP_DATA to an absolute path to use a host folder instead
    environment:
      - MEDIA_ROOT=/media
      - PORT=3003
    restart: unless-stopped

volumes:
  jellyfin-downloader-data:
